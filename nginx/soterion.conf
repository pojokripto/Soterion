# Rate limiting zones
limit_req_zone $binary_remote_addr zone=soterion_fe_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=soterion_api_limit:10m rate=20r/s;

# HTTP -> HTTPS redirect for all domains
server {
    listen 80;
    server_name <your-domain> www.<your-domain> api.<your-domain>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — <your-domain>
server {
    listen 443 ssl;
    server_name <your-domain> www.<your-domain>;

    ssl_certificate /etc/letsencrypt/live/<your-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<your-domain>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=soterion_fe_limit burst=40 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend API — api.<your-domain>
server {
    listen 443 ssl;
    server_name api.<your-domain>;

    ssl_certificate /etc/letsencrypt/live/api.<your-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.<your-domain>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        limit_req zone=soterion_api_limit burst=30 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
